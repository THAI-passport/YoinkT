apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: YoinkT
  annotations:
    # streams are long-lived; disable buffering + raise timeouts (nginx ingress)
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: YoinkT.example.com   # change
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: YoinkT
                port: { number: 80 }
