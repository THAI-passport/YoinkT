name: build

# Two separate questions, two separate jobs:
#
#   "does what we SHIP still work?"  -> test / smoke / image, all on ENGINE_VERSION
#   "will the NEXT engine break us?" -> engine-canary, on the newest build
#
# The image pins its engine on purpose (see Dockerfile). The canary is what
# earns the right to do that: it runs the same suite against the newest build
# weekly, so an upgrade becomes a decision made on evidence rather than a
# default that silently changes download behavior.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # Keep in sync with the Dockerfile ARG of the same name.
  ENGINE_VERSION: "2026.07.04"

jobs:
  test:
    # Tests the engine build the image actually ships.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (pinned engine — matches the image)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install "yt-dlp==${ENGINE_VERSION}"
          pip install --upgrade gallery-dl
      - name: Offline test suite
        run: python tests/test_x_offline.py
      - name: Syntax check UI
        run: |
          node --version || sudo apt-get install -y nodejs
          python - <<'PY'
          import re, subprocess, pathlib
          js = re.search(r"<script>(.*)</script>",
                         pathlib.Path("backend/static/index.html").read_text(), re.S).group(1)
          pathlib.Path("/tmp/ui.js").write_text(js)
          import sys; sys.exit(subprocess.run(["node","--check","/tmp/ui.js"]).returncode)
          PY

  engine-canary:
    # Early warning only — never gates the build. A red canary means "the next
    # engine bump needs attention before you take it", not "main is broken".
    # If this fails, read the diff between ENGINE_VERSION and the build below
    # before touching the pin.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps (newest engine, incl. same-day builds)
        run: |
          pip install -r backend/requirements.txt
          pip install --pre --upgrade yt-dlp
          pip install --upgrade gallery-dl
      - name: Report engine delta
        run: |
          echo "pinned : ${ENGINE_VERSION}"
          python -c "import yt_dlp.version as v; print('canary :', v.__version__)"
      - name: Offline test suite
        run: python tests/test_x_offline.py

  smoke:
    # live per-site check; network to social sites may be blocked on CI runners,
    # so it's allowed to fail (informational). Run locally for a real signal.
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: |
          pip install -r backend/requirements.txt
          pip install "yt-dlp==${ENGINE_VERSION}"
          pip install --upgrade gallery-dl
          sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Start server + smoke
        run: |
          ( cd backend && uvicorn app:app --host 127.0.0.1 --port 8000 & )
          sleep 6
          python tests/smoke_live.py || true

  image:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push by default — add registry login + push here)
        run: docker build --build-arg ENGINE_VERSION="${ENGINE_VERSION}" -t yoink:latest .
