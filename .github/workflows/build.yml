name: build

# Weekly rebuild is the #1 maintenance lever: a stale yt-dlp breaks extraction
# whenever a platform changes internals. This picks up the latest yt-dlp,
# runs the offline test suite, and (on main) builds + pushes the image.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps (latest yt-dlp + gallery-dl)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install --upgrade yt-dlp gallery-dl
      - name: Offline test suite
        run: python tests/test_x_offline.py
      - name: Syntax check UI
        run: |
          node --version || sudo apt-get install -y nodejs
          python - <<'PY'
          import re, subprocess, pathlib
          js = re.search(r"<script>(.*)</script>",
                         pathlib.Path("backend/static/index.html").read_text(), re.S).group(1)
          pathlib.Path("/tmp/ui.js").write_text(js)
          import sys; sys.exit(subprocess.run(["node","--check","/tmp/ui.js"]).returncode)
          PY

  smoke:
    # live per-site check; network to social sites may be blocked on CI runners,
    # so it's allowed to fail (informational). Run locally for a real signal.
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: |
          pip install -r backend/requirements.txt
          pip install --upgrade yt-dlp gallery-dl
          sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Start server + smoke
        run: |
          ( cd backend && uvicorn app:app --host 127.0.0.1 --port 8000 & )
          sleep 6
          python tests/smoke_live.py || true

  image:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push by default — add registry login + push here)
        run: docker build -t yoink:latest .
